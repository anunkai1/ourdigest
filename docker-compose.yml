services:
  ourdigest:
    build: .
    image: anunkai1/ourdigest:latest
    container_name: ourdigest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      - OURDIGEST_CONFIG=/app/config.yaml
      - OURDIGEST_BASE_URL=${OURDIGEST_BASE_URL:-http://localhost:8088}
      # LLM gateway — point at your local server or hosted API
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OURDIGEST_SUMMARIZE_MODEL=${OURDIGEST_SUMMARIZE_MODEL:-qwen2.5-7b-instruct}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8088/healthz').status==200 else 1)"]
      interval: 5m
      timeout: 5s
      retries: 3
